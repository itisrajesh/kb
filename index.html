<!doctype html>

  <head>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("sw.js")
          .then(() => console.log("✓ Service worker registered"))
          .catch((err) => console.warn("✗ SW registration failed", err));
      }

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              t: {
                bg: "var(--bg)",
                surface: "var(--surface)",
                text: "var(--text)",
                muted: "var(--muted)",
                border: "var(--border)",
                accent: "var(--accent)",
                "accent-fg": "var(--accent-fg)",
              },
            },
            animation: {
              "slide-in": "slideIn 0.3s ease-out forwards",
              "fade-in": "fadeIn 0.5s ease-out",
              blob: "blob 35s infinite",
              "blob-2": "blob2 40s infinite",
              "blob-3": "blob3 45s infinite",
            },
            keyframes: {
              slideIn: {
                "0%": { transform: "translateX(20px)", opacity: "0" },
                "100%": { transform: "translateX(0)", opacity: "1" },
              },
              fadeIn: {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" },
              },
              blob: {
                "0%": { transform: "translate(0px, 0px)" },
                "12%": { transform: "translate(140px, 60px)" },
                "25%": { transform: "translate(120px, 140px)" },
                "37%": { transform: "translate(40px, 160px)" },
                "50%": { transform: "translate(-80px, 100px)" },
                "62%": { transform: "translate(-140px, 20px)" },
                "75%": { transform: "translate(-100px, -80px)" },
                "87%": { transform: "translate(20px, -130px)" },
                "100%": { transform: "translate(0px, 0px)" },
              },
              blob2: {
                "0%": { transform: "translate(0px, 0px)" },
                "12%": { transform: "translate(-100px, 120px)" },
                "25%": { transform: "translate(-140px, 40px)" },
                "37%": { transform: "translate(-80px, -100px)" },
                "50%": { transform: "translate(60px, -150px)" },
                "62%": { transform: "translate(140px, -60px)" },
                "75%": { transform: "translate(120px, 80px)" },
                "87%": { transform: "translate(30px, 140px)" },
                "100%": { transform: "translate(0px, 0px)" },
              },
              blob3: {
                "0%": { transform: "translate(0px, 0px)" },
                "12%": { transform: "translate(80px, -110px)" },
                "25%": { transform: "translate(-50px, -150px)" },
                "37%": { transform: "translate(-140px, -40px)" },
                "50%": { transform: "translate(-100px, 90px)" },
                "62%": { transform: "translate(-20px, 150px)" },
                "75%": { transform: "translate(110px, 70px)" },
                "87%": { transform: "translate(150px, -60px)" },
                "100%": { transform: "translate(0px, 0px)" },
              },
            },
            typography: {
              xs: {
                css: {
                  fontSize: "0.8125rem",
                  h1: { fontSize: "1.25rem" },
                  h2: { fontSize: "1rem" },
                  h3: { fontSize: "0.9375rem" },
                  code: { fontSize: "0.8125rem" },
                  pre: { fontSize: "0.75rem" },

              },
            },
          },

      };
    </script>

    <style>
      /* Smooth transitions */
      body,
      div,
      button,
      input,
      textarea {
        transition:
          background-color 0.3s ease,
          border-color 0.3s ease,
          color 0.3s ease;
      }
      /* Glassmorphism */
      .glass {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        background: var(--surface-glass);
        border-bottom: 1px solid var(--border);
      }
      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
      }
      html {
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      pre[class*="language-"] {
        background: var(--surface) !important;
        text-shadow: none !important;
        margin: 0 !important;
        padding: 1rem !important;
      }
      .mermaid {
        display: flex;
        justify-content: center;
        margin: 1rem 0;
      }
      svg[id^="mermaid"] {
        border-radius: 8px;
      }
      :root {
        --bg: #ffffff;
        --surface: #f3f4f6;
        --surface-glass: rgba(255, 255, 255, 0.8);
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #3b82f6;
        --accent-fg: #ffffff;
      }
      .animate-blob {
        will-change: transform;
        transform: translate3d(0, 0, 0);
        -webkit-transform: translate3d(0, 0, 0);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        -webkit-perspective: 1000;
        image-rendering: -webkit-optimize-contrast;
      }
      .sidebar-list-wrapper {
        position: relative;
        height: 100%;
      }
      .sidebar-list-pane {
        position: absolute;
        inset: 0;
        will-change: transform, opacity;
      }
      @keyframes slideInFromRight {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0%);
          opacity: 1;
        }
      }
      @keyframes slideOutToLeft {
        from {
          transform: translateX(0%);
          opacity: 1;
        }
        to {
          transform: translateX(-100%);
          opacity: 0;
        }
      }
      @keyframes slideInFromLeft {
        from {
          transform: translateX(-100%);
          opacity: 0;
        }
        to {
          transform: translateX(0%);
          opacity: 1;
        }
      }
      @keyframes slideOutToRight {
        from {
          transform: translateX(0%);
          opacity: 1;
        }
        to {
          transform: translateX(100%);
          opacity: 0;
        }
      }
      .slide-in-from-right {
        animation: slideInFromRight 280ms ease-out forwards;
      }
      .slide-out-to-left {
        animation: slideOutToLeft 280ms ease-out forwards;
      }
      .slide-in-from-left {
        animation: slideInFromLeft 280ms ease-out forwards;
      }
      .slide-out-to-right {
        animation: slideOutToRight 280ms ease-out forwards;
      }
      aside {
        transition:
          width 150ms ease-in-out,
          opacity 150ms ease-in-out,
          border-color 150ms ease-in-out;
      }
      .kb-search-highlight {
        background: var(--accent, #2563eb);
        color: var(--accent-fg, #fff);
        border-radius: 3px;
        padding: 0 2px;
        font-weight: bold;
      }
    </style>
  </head>

  <body
    class="min-h-screen font-sans bg-t-bg text-t-text overflow-x-hidden selection:bg-t-accent selection:text-t-accent-fg"
  >
    <div id="root"></div>

    <script type="text/babel">
      mermaid.initialize({ startOnLoad: false, theme: "default" });

      const renderer = new marked.Renderer();
      const originalCode = renderer.code.bind(renderer);
      renderer.code = function ({ text, lang, escaped }) {
        if (lang === "mermaid") {
          return `<div class="mermaid">${text}</div>`;
        }
        return originalCode({ text, lang, escaped });
      };
      marked.setOptions({ renderer });

      const { useState, useEffect, useRef, useMemo } = React;

      const THEMES = {
        paper: {

            "--bg": "#F9FAFB",
            "--surface": "#FFFFFF",

            "--text": "#1F2937",
            "--muted": "#6B7280",
            "--border": "#E5E7EB",
            "--accent": "#2563EB",
            "--accent-fg": "#FFFFFF",
            "--prism":
              "https://cdn.jsdelivr.net/npm/prismjs/themes/prism.min.css",
          },
        },

          colors: {
            "--bg": "#111827",
            "--surface": "#1F2937",

            "--text": "#F9FAFB",
            "--muted": "#9CA3AF",

            "--accent-fg": "#111827",

          },
        },

        forest: {

            "--text": "#064E3B",
            "--muted": "#059669",
            "--border": "#6EE7B7",
            "--accent": "#059669",
            "--accent-fg": "#FFFFFF",
            "--prism":
              "https://cdn.jsdelivr.net/npm/prismjs/themes/prism.min.css",
          },
        },

        cyberpunk: {
          label: "Cyberpunk",
          hasBlobs: false,
          colors: {
            "--bg": "#0f0e17",

            "--accent": "#ff006e",
            "--accent-fg": "#fffffe",
            "--prism":
              "https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css",
          },
        },

        // Replaced "Coffee" with "Terminal" (Dark)
        terminal: {

            "--surface-glass": "rgba(23, 23, 23, 0.9)",
            "--text": "#E5E5E5",
            "--muted": "#A3A3A3",
            "--border": "#404040",
            "--accent": "#FAFAFA",
            "--accent-fg": "#000000",
            "--prism":
              "https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css",
          },
        },

        sunset: {
          label: "Sunset",
          hasBlobs: true,

          hasBlobs: false,

            "--text": "#881337",
            "--muted": "#BE123C",

            "--prism":
              "https://cdn.jsdelivr.net/npm/prismjs/themes/prism.min.css",

        // Replaced "Lavender" with "Dracula" (Dark)

            "--text": "#F8F8F2",

          },

        matrix: {

          hasBlobs: true,

            "--text": "#4ADE80",

              "https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css",
          },
        },

        // Replaced "Desert" with "Ember" (Dark)
        ember: {
          label: "Ember",

          colors: {

            "--surface": "#292524",
            "--surface-glass": "rgba(41, 37, 36, 0.9)",
            "--text": "#F5F5F4",
            "--muted": "#A8A29E",
            "--border": "#44403C",
            "--accent": "#FF4000",
            "--accent-fg": "#1C1917",
            "--prism":
              "https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css",
          },
        },
      };

      const FONT_SIZES = {
        xs: "prose-xs",
        small: "prose-sm",
        medium: "prose-base",
        large: "prose-lg",
        xl: "prose-xl",
      };

      const generateId = () => Math.random().toString(36).substr(2, 9);
      const toPascalCase = (str) => {
        if (!str) return "Circle";
        return str.replace(/(^\w|-\w)/g, (clear) =>
          clear.replace(/-/, "").toUpperCase(),
        );
      };

      const Icon = ({ name, size = 16, className = "" }) => {
        const pascalName = toPascalCase(name);
        const iconData = lucide.icons[pascalName] || lucide.icons.Circle;
        const svgString = iconData
          ? `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}">${iconData
              .map(
                (child) =>
                  `<${child[0]} ${Object.entries(child[1])
                    .map(([k, v]) => `${k}="${v}"`)
                    .join(" ")} />`,
              )
              .join("")}</svg>`
          : "";
        return (
          <span
            dangerouslySetInnerHTML={{ __html: svgString }}
            className="flex items-center justify-center inline-block"
          />
        );
      };

      const MarkdownViewer = ({ content, fontSizeClass }) => {
        const ref = useRef(null);
        useEffect(() => {
          if (ref.current) {
            Prism.highlightAllUnder(ref.current);
            setTimeout(() => {
              mermaid
                .run()
                .catch((err) => console.error("Mermaid error:", err));
            }, 0);
          }
        }, [content]);
        return (
          <div
            ref={ref}
            className={`prose max-w-none text-t-text prose-headings:text-t-text prose-strong:text-t-text prose-code:text-t-accent prose-a:text-t-accent ${fontSizeClass}`}
            dangerouslySetInnerHTML={{ __html: marked.parse(content) }}
          />
        );
      };

      const GraphView = ({ topics, activeTopicId, onNodeClick }) => {
        const containerRef = useRef(null);

        useEffect(() => {
          if (!containerRef.current) return;

          window.handleGraphNodeClick = (id) => {
            onNodeClick(id);
          };

          let markup = "flowchart LR\n";

          const buildGraph = (nodes, parentId = null) => {
            nodes.forEach((node) => {
              const safeTitle = node.title.replace(/["\\[\]()]/g, "");
              markup += `  ${node.id}["${safeTitle}"]\n`;
              markup += `  click ${node.id} "javascript:window.handleGraphNodeClick('${node.id}')"\n`;

              if (node.id === activeTopicId) {
                markup += `  style ${node.id} stroke:#3b82f6,stroke-width:4px\n`;
              }

              if (parentId) {
                markup += `  ${parentId} --> ${node.id}\n`;
              }

              if (node.children && node.children.length > 0) {
                buildGraph(node.children, node.id);
              }
            });
          };

          buildGraph(topics);

          try {
            containerRef.current.innerHTML = "";
            mermaid
              .render("mermaid-graph-view", markup)
              .then((result) => {
                if (containerRef.current) {
                  containerRef.current.innerHTML = result.svg;
                }
              })
              .catch((e) => {
                containerRef.current.innerHTML = `<div class="p-4 text-red-500 bg-red-100/10 rounded-lg">Graph Render Error: ${e.message}</div>`;
              });
          } catch (err) {
            console.error("Mermaid render error:", err);
          }

          return () => {
            delete window.handleGraphNodeClick;
          };
        }, [topics, activeTopicId, onNodeClick]);

        // Using scoped styles instead of classDef var() solves the syntax error entirely.
        return (
          <div className="w-full h-[600px] overflow-auto bg-t-surface/50 border border-t-border rounded-xl p-8 relative mermaid-container animate-fade-in shadow-inner">
            <style>{`
                    .mermaid-container .node rect, .mermaid-container .node circle, .mermaid-container .node polygon { 
                        fill: var(--surface) !important; 
                        stroke: var(--border) !important; 
                    }
                    .mermaid-container .node text { 
                        fill: var(--text) !important; 
                    }
                    .mermaid-container .edgePath path { 
                        stroke: var(--muted) !important; 
                    }
                    .mermaid-container .edgeLabel {
                        background-color: var(--bg) !important;
                        color: var(--text) !important;
                    }
                    .mermaid-container .node:hover rect {
                        fill: var(--border) !important;
                        cursor: pointer;
                    }
                `}</style>
            <div
              ref={containerRef}
              className="flex justify-center min-w-max"
            ></div>
          </div>
        );
      };

      const SettingsModal = ({
        isOpen,
        onClose,
        currentTheme,
        onSetTheme,
        onImport,
        onExport,
        fontSize,
        onSetFontSize,
        blobAnimationEnabled,
        onSetBlobAnimation,
      }) => {
        if (!isOpen) return null;
        return (
          <div
            className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in"
            onClick={onClose}
          >
            <div
              className="bg-t-surface border border-t-border rounded-xl shadow-2xl w-full max-w-md p-6 relative overflow-hidden"
              onClick={(e) => e.stopPropagation()}
            >
              <div className="flex items-center justify-between mb-6">
                <button
                  className="text-xl font-bold flex items-center gap-2 md:cursor-default"
                  onDoubleClick={(e) => {
                    e.preventDefault();
                    if (!document.fullscreenElement) {
                      document.documentElement.requestFullscreen();
                    } else {
                      document.exitFullscreen();
                    }
                  }}
                >
                  <Icon name="settings" size={20} /> Settings
                </button>
                <button
                  onClick={onClose}
                  className="text-t-muted hover:text-t-text hover:bg-t-border p-2 rounded-full transition"
                >
                  <Icon name="x" size={20} />
                </button>
              </div>
              <div className="mb-6">
                <label className="block text-sm font-medium text-t-muted mb-2">
                  Theme
                </label>
                <div className="grid grid-cols-2 gap-2">
                  {Object.entries(THEMES).map(([key, theme]) => (
                    <button
                      key={key}
                      onClick={() => onSetTheme(key)}
                      className={`px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 ${currentTheme === key ? "bg-t-accent text-t-accent-fg ring-2 ring-offset-2 ring-t-accent" : "bg-t-bg text-t-text hover:bg-t-border border border-transparent"}`}
                    >
                      <div
                        className="w-3 h-3 rounded-full"
                        style={{ background: theme.colors["--accent"] }}
                      ></div>
                      {theme.label}
                    </button>
                  ))}
                </div>
              </div>
              <div className="mt-4">
                <label className="block text-sm font-medium text-t-muted mb-2">
                  Blob Animation
                </label>
                <button
                  onClick={() => onSetBlobAnimation(!blobAnimationEnabled)}
                  className={`w-full py-2 px-4 text-sm rounded-lg border transition mb-6 ${blobAnimationEnabled ? "bg-t-accent text-t-accent-fg ring-2 ring-offset-2 ring-t-accent" : "bg-t-bg text-t-text hover:bg-t-border border border-transparent"}`}
                >
                  {blobAnimationEnabled
                    ? "Disable Blob Animation"
                    : "Enable Blob Animation"}
                </button>
              </div>
              <div className="mb-6">
                <label className="block text-sm font-medium text-t-muted mb-2">
                  Readability (Font Size)
                </label>
                <div className="flex bg-t-bg rounded-lg border border-t-border p-1">
                  {["xs", "small", "medium", "large", "xl"].map((size) => (
                    <button
                      key={size}
                      onClick={() => onSetFontSize(size)}
                      className={`flex-1 py-1.5 rounded-md text-xs font-medium capitalize transition-all ${fontSize === size ? "bg-t-accent text-t-accent-fg shadow-sm" : "text-t-muted hover:text-t-text"}`}
                    >
                      {size}
                    </button>
                  ))}
                </div>
              </div>
              <div className="space-y-3">
                <label className="block text-sm font-medium text-t-muted">
                  Data Management
                </label>
                <div className="flex gap-3">
                  <label className="flex-1 cursor-pointer bg-t-bg hover:bg-t-border border border-t-border text-t-text py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition text-sm font-medium">
                    <input
                      type="file"
                      className="hidden"
                      accept=".json"
                      onChange={onImport}
                    />
                    <Icon name="upload" size={16} /> Import
                  </label>
                  <button
                    onClick={onExport}
                    className="flex-1 bg-t-bg hover:bg-t-border border border-t-border text-t-text py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition text-sm font-medium"
                  >
                    <Icon name="download" size={16} /> Export
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const App = () => {
        const [topics, setTopics] = useState(() => {
          const saved = localStorage.getItem("kb_data");
          return saved
            ? JSON.parse(saved)
            : [
                {
                  id: "intro",
                  title: "Introduction",
                  icon: "book",
                  completed: false,
                  children: [],
                  blocks: [
                    {
                      id: "b1",
                      content:
                        "# Welcome\nThis is your knowledge base. Click **Edit** to start writing.",
                    },
                  ],
                },
              ];
        });
        const [viewPath, setViewPath] = useState([]);
        const [activeTopicId, setActiveTopicId] = useState(() => {
          const params = new URLSearchParams(window.location.search);
          if (params.get("topic")) return params.get("topic");
          try {
            return localStorage.getItem("kb_lastActiveTopic") || "intro";
          } catch (e) {
            return "intro";
          }
        });

        const [editMode, setEditMode] = useState(false);
        const [viewMode, setViewMode] = useState("content"); // "content" | "graph"
        const [distractionFree, setDistractionFree] = useState(false);

        const loadSetting = (key, fallback) => {
          try {
            const v = localStorage.getItem(key);
            return v !== null ? JSON.parse(v) : fallback;
          } catch (e) {
            return fallback;
          }
        };
        const [themeKey, setThemeKey] = useState(() =>
          loadSetting("kb_theme", "paper"),
        );
        const [fontSize, setFontSize] = useState(() =>
          loadSetting("kb_fontSize", "medium"),
        );
        const [searchQuery, setSearchQuery] = useState("");
        const searchInputRef = useRef(null);

        const [blobAnimationEnabled, setBlobAnimationEnabled] = useState(() =>
          loadSetting(
            "kb_blobAnimation",
            THEMES[loadSetting("kb_theme", "paper")].hasBlobs,
          ),
        );

        const [timerSeconds, setTimerSeconds] = useState(0);
        const [timerRunning, setTimerRunning] = useState(true);
        const timerRef = useRef(null);
        const clickCountRef = useRef(0);
        const clickTimerRef = useRef(null);
        const [tempTopicData, setTempTopicData] = useState(null);
        const [settingsOpen, setSettingsOpen] = useState(false);
        const [scrollProgress, setScrollProgress] = useState(0);

        const [sidebarOpen, setSidebarOpen] = useState(false);
        const [animatingSidebar, setAnimatingSidebar] = useState(false);
        const [prevSidebarList, setPrevSidebarList] = useState([]);
        const [navDirection, setNavDirection] = useState("forward");
        const [isSafari, setIsSafari] = useState(false);
        const [draggedId, setDraggedId] = useState(null);
        const [dragOverId, setDragOverId] = useState(null);
        const [desktopSidebarCollapsed, setDesktopSidebarCollapsed] =
          useState(false);

        // Modal State for custom alerts/confirms
        const [dialogConfig, setDialogConfig] = useState(null);

        useEffect(() => {
          const ua = navigator.userAgent.toLowerCase();
          setIsSafari(ua.indexOf("safari") > -1 && ua.indexOf("chrome") < 0);
        }, []);

        useEffect(
          () => localStorage.setItem("kb_data", JSON.stringify(topics)),
          [topics],
        );
        useEffect(() => {
          try {
            localStorage.setItem("kb_theme", JSON.stringify(themeKey));
          } catch (e) {}
        }, [themeKey]);
        useEffect(() => {
          try {
            localStorage.setItem("kb_fontSize", JSON.stringify(fontSize));
          } catch (e) {}
        }, [fontSize]);
        useEffect(() => {
          try {
            localStorage.setItem("kb_lastActiveTopic", activeTopicId);
          } catch (e) {}
        }, [activeTopicId]);
        useEffect(() => {
          try {
            localStorage.setItem(
              "kb_blobAnimation",
              JSON.stringify(blobAnimationEnabled),
            );
          } catch (e) {}
        }, [blobAnimationEnabled]);

        useEffect(() => {
          const handleKeyDown = (e) => {
            // Focus Search
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
              e.preventDefault();
              if (searchInputRef.current) searchInputRef.current.focus();
            }
            // Toggle Distraction Free
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "d") {
              e.preventDefault();
              setDistractionFree((prev) => !prev);
            }
          };
          window.addEventListener("keydown", handleKeyDown);
          return () => window.removeEventListener("keydown", handleKeyDown);
        }, []);

        useEffect(() => {
          const handleKeyDownContext = (e) => {
            // Enter Edit Mode
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "e") {
              e.preventDefault();
              if (activeTopicId && !editMode && activeTopic) {
                setTempTopicData(activeTopic);
                setEditMode(true);
                setViewMode("content");
              }
            }
            // Save Edit
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
              if (editMode) {
                e.preventDefault();
                setTopics(
                  updateTree(topics, activeTopic.id, () => tempTopicData),
                );
                setEditMode(false);
              }
            }
            // New Topic
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "n") {
              e.preventDefault();
              handleCreateTopic();
            }
          };
          window.addEventListener("keydown", handleKeyDownContext);
          return () =>
            window.removeEventListener("keydown", handleKeyDownContext);
        }, [activeTopicId, editMode, tempTopicData, topics, viewPath]);

        useEffect(() => {
          const theme = THEMES[themeKey];
          const root = document.documentElement;
          Object.entries(theme.colors).forEach(([key, val]) => {
            if (key !== "--prism") root.style.setProperty(key, val);
          });
          document.getElementById("prism-theme").href = theme.colors["--prism"];
          const mermaidTheme =
            themeKey === "night" ||
            themeKey === "cyberpunk" ||
            themeKey === "dracula" ||
            themeKey === "matrix" ||
            themeKey === "terminal" ||
            themeKey === "ember"
              ? "dark"
              : "default";
          mermaid.initialize({ startOnLoad: false, theme: mermaidTheme });
          try {
            const themeMeta = document.querySelector(
              'meta[name="theme-color"]',
            );
            if (themeMeta && theme.colors["--surface-glass"]) {
              themeMeta.setAttribute(
                "content",
                theme.colors["--surface-glass"],
              );
            }
          } catch (e) {}
        }, [themeKey]);

        useEffect(() => {
          const handleScroll = () => {
            const totalScroll = document.documentElement.scrollTop;
            const windowHeight =
              document.documentElement.scrollHeight -
              document.documentElement.clientHeight;
            const scroll = windowHeight > 0 ? totalScroll / windowHeight : 0;
            setScrollProgress(scroll);
            localStorage.setItem(
              `kb_scroll_${activeTopicId}`,
              JSON.stringify(totalScroll),
            );
          };
          window.addEventListener("scroll", handleScroll);
          return () => window.removeEventListener("scroll", handleScroll);
        }, [activeTopicId]);

        useEffect(() => {
          const savedScroll = localStorage.getItem(
            `kb_scroll_${activeTopicId}`,
          );
          if (savedScroll !== null) {
            const scrollPos = JSON.parse(savedScroll);
            setTimeout(() => {
              window.scrollTo(0, scrollPos);
            }, 100);
          } else {
            window.scrollTo(0, 0);
          }
        }, [activeTopicId]);

        useEffect(() => {
          if (timerRef.current) {
            clearInterval(timerRef.current);
            timerRef.current = null;
          }
          setTimerSeconds(0);
          if (activeTopicId) {
            timerRef.current = setInterval(() => {
              setTimerSeconds((prev) => prev + 1);
            }, 1000);
            setTimerRunning(true);
          } else {
            setTimerRunning(false);
          }
          return () => {
            if (timerRef.current) {
              clearInterval(timerRef.current);
              timerRef.current = null;
            }
          };
        }, [activeTopicId]);

        const startTimer = () => {
          if (timerRef.current) {
            clearInterval(timerRef.current);
          }
          timerRef.current = setInterval(() => {
            setTimerSeconds((prev) => prev + 1);
          }, 1000);
          setTimerRunning(true);
        };

        const pauseTimer = () => {
          if (timerRef.current) {
            clearInterval(timerRef.current);
            timerRef.current = null;
          }
          setTimerRunning(false);
        };

        const resumeTimer = () => {
          if (!activeTopicId) return;
          if (timerRef.current) {
            clearInterval(timerRef.current);
          }
          timerRef.current = setInterval(() => {
            setTimerSeconds((prev) => prev + 1);
          }, 1000);
          setTimerRunning(true);
        };

        const handleTimerClick = () => {
          clickCountRef.current += 1;
          if (clickTimerRef.current) {
            clearTimeout(clickTimerRef.current);
          }
          clickTimerRef.current = setTimeout(() => {
            if (clickCountRef.current >= 3) {
              resetTimer();
            } else if (clickCountRef.current === 2) {
              if (timerRunning) {
                pauseTimer();
              } else {
                resumeTimer();
              }
            }
            clickCountRef.current = 0;
            clickTimerRef.current = null;
          }, 250);
        };

        useEffect(() => {
          return () => {
            if (clickTimerRef.current) {
              clearTimeout(clickTimerRef.current);
            }
          };
        }, []);

        const resetTimer = () => {
          if (timerRef.current) {
            clearInterval(timerRef.current);
            timerRef.current = null;
          }
          setTimerSeconds(0);
          if (activeTopicId) {
            timerRef.current = setInterval(() => {
              setTimerSeconds((prev) => prev + 1);
            }, 1000);
            setTimerRunning(true);
          } else {
            setTimerRunning(false);
          }
        };

        const selectTopic = (topicId) => {
          if (topicId === activeTopicId) {
            setActiveTopicId(null);
            setViewPath([]);
            resetTimer();
          } else {
            setActiveTopicId(topicId);
            resetTimer();
          }
        };

        const findNode = (nodes, id) => {
          for (let node of nodes) {
            if (node.id === id) return node;
            if (node.children.length) {
              const found = findNode(node.children, id);
              if (found) return found;
            }
          }
          return null;
        };

        const updateTree = (nodes, id, updateFn) => {
          return nodes.map((node) => {
            if (node.id === id) return updateFn(node);
            if (node.children.length)
              return {
                ...node,
                children: updateTree(node.children, id, updateFn),
              };
            return node;
          });
        };

        const deleteFromTree = (nodes, id) => {
          return nodes
            .filter((n) => n.id !== id)
            .map((n) => ({ ...n, children: deleteFromTree(n.children, id) }));
        };

        const moveItemInTree = (nodes, draggedId, targetId, currentPath) => {
          let draggedItem = null;
          const removeFromTree = (nodeList) => {
            return nodeList.filter((n) => {
              if (n.id === draggedId) {
                draggedItem = n;
                return false;
              }
              n.children = removeFromTree(n.children);
              return true;
            });
          };
          let result = removeFromTree(nodes);
          if (!draggedItem) return nodes;

          const insertAfterInList = (list, draggedItem, targetId) => {
            const idx = list.findIndex((n) => n.id === targetId);
            if (idx !== -1) {
              const newList = [...list];
              newList.splice(idx + 1, 0, draggedItem);
              return newList;
            }
            return list;
          };

          if (currentPath.length === 0) {
            result = insertAfterInList(result, draggedItem, targetId);
          } else {
            result = updateTree(
              result,
              currentPath[currentPath.length - 1],
              (n) => ({
                ...n,
                children: insertAfterInList(n.children, draggedItem, targetId),
              }),
            );
          }
          return result;
        };

        const activeTopic = useMemo(
          () => findNode(topics, activeTopicId),
          [topics, activeTopicId],
        );

        const topParentName = useMemo(() => {
          if (viewPath.length > 0) {
            const root = findNode(topics, viewPath[0]);
            return root ? root.title : "Knowledge Base";
          }
          if (activeTopic) {
            const isRoot = topics.find((t) => t.id === activeTopicId);
            return isRoot ? isRoot.title : "Knowledge Base";
          }
          return "Knowledge Base";
        }, [viewPath, activeTopic, topics]);

        const currentSidebarList = useMemo(() => {
          if (viewPath.length === 0) return topics;
          let current = topics;
          for (let id of viewPath) {
            const node = findNode(current, id);
            if (node) current = node.children;
            else return [];
          }
          return current;
        }, [topics, viewPath]);

        const [debouncedSearchQuery, setDebouncedSearchQuery] = useState("");
        useEffect(() => {
          const handler = setTimeout(() => {
            setDebouncedSearchQuery(searchQuery);
          }, 400);
          return () => clearTimeout(handler);
        }, [searchQuery]);

        const searchResults = useMemo(() => {
          if (!debouncedSearchQuery) return [];
          const query = debouncedSearchQuery.toLowerCase();
          const results = [];
          function searchTopics(nodes) {
            for (let topic of nodes) {
              const titleLower = topic.title.toLowerCase();
              if (titleLower.includes(query)) {
                let highlightedTitle = topic.title.replace(
                  new RegExp(`(${debouncedSearchQuery})`, "gi"),
                  '<span class="kb-search-highlight">$1</span>',
                );
                results.push({
                  ...topic,
                  matchType: "title",
                  matchBlockIdx: null,
                  matchSnippet: highlightedTitle,
                  matchId: `${topic.id}-title`,
                });
              }
              if (topic.blocks && topic.blocks.length) {
                for (
                  let blockIdx = 0;
                  blockIdx < topic.blocks.length;
                  blockIdx++
                ) {
                  const block = topic.blocks[blockIdx];
                  const content = block.content || "";
                  const lowerContent = content.toLowerCase();
                  const matchIdx = lowerContent.indexOf(query);
                  if (matchIdx !== -1) {
                    const snippetStart = Math.max(0, matchIdx - 30);
                    const snippetEnd = Math.min(
                      content.length,
                      matchIdx + query.length + 30,
                    );
                    const blockMatchText = content.substring(
                      snippetStart,
                      snippetEnd,
                    );
                    let highlightedSnippet = blockMatchText.replace(
                      new RegExp(`(${debouncedSearchQuery})`, "gi"),
                      '<span class="kb-search-highlight">$1</span>',
                    );
                    results.push({
                      ...topic,
                      matchType: "content",
                      matchBlockIdx: blockIdx,
                      matchSnippet: highlightedSnippet,
                      matchOffset: matchIdx,
                      matchId: `${topic.id}-block${blockIdx}-match${matchIdx}`,
                    });
                  }
                }
              }
              if (topic.children && topic.children.length > 0) {
                searchTopics(topic.children);
              }
            }
          }
          searchTopics(topics);
          const seenIds = new Set();
          const deduped = [];
          for (const r of results) {
            if (!seenIds.has(r.matchId)) {
              deduped.push(r);
              seenIds.add(r.matchId);
            }
          }
          return deduped;
        }, [topics, debouncedSearchQuery]);

        // Handle iframe security restriction safely using try-catch
        useEffect(() => {
          const params = new URLSearchParams(window.location.search);
          if (activeTopicId) params.set("topic", activeTopicId);
          else params.delete("topic");
          const newQuery = params.toString();
          const newUrl =
            window.location.pathname + (newQuery ? "?" + newQuery : "");
          try {
            window.history.replaceState({}, "", newUrl);
          } catch (e) {
            console.debug(
              "Could not update URL history due to iframe restrictions",
              e,
            );
          }
        }, [activeTopicId]);

        useEffect(() => {
          if (!activeTopicId) {
            const firstId = topics[0]?.id || null;
            if (firstId) setActiveTopicId(firstId);
            return;
          }
          const exists = findNode(topics, activeTopicId);
          if (!exists) {
            const firstId = topics[0]?.id || null;
            setActiveTopicId(firstId);
          }
        }, [topics]);

        const handleDrillDown = (id) => {
          resetTimer();
          if (searchQuery) {
            setViewPath([...viewPath, id]);
            return;
          }
          setPrevSidebarList(currentSidebarList);
          setNavDirection("forward");
          setAnimatingSidebar(true);
          setViewPath([...viewPath, id]);
          setTimeout(() => {
            setAnimatingSidebar(false);
            setPrevSidebarList([]);
          }, 300);
        };

        const handleBack = () => {
          if (searchQuery) {
            setViewPath(viewPath.slice(0, -1));
            return;
          }
          setPrevSidebarList(currentSidebarList);
          setNavDirection("back");
          setAnimatingSidebar(true);
          setViewPath(viewPath.slice(0, -1));
          setTimeout(() => {
            setAnimatingSidebar(false);
            setPrevSidebarList([]);
          }, 300);
        };

        const handleCreateTopic = (parentId) => {
          const newTopic = {
            id: generateId(),
            title: "New Topic",
            icon: "file",
            completed: false,
            children: [],
            blocks: [{ id: generateId(), content: "Start writing..." }],
          };
          if (viewPath.length === 0) setTopics([...topics, newTopic]);
          else
            setTopics(
              updateTree(topics, viewPath[viewPath.length - 1], (n) => ({
                ...n,
                children: [...n.children, newTopic],
              })),
            );
        };

        const handleExport = () => {
          const dataStr =
            "data:text/json;charset=utf-8," +
            encodeURIComponent(JSON.stringify(topics));
          const node = document.createElement("a");
          node.href = dataStr;
          node.download = "kb_backup.json";
          node.click();
        };

        const handleImport = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              setTopics(JSON.parse(ev.target.result));
              setDialogConfig({
                type: "alert",
                message: "Data imported successfully!",
              });
              setSettingsOpen(false);
            } catch (err) {
              setDialogConfig({
                type: "alert",
                message: "Invalid JSON file structure.",
              });
            }
          };
          reader.readAsText(file);
        };

        return (
          <div className="relative min-h-screen transition-colors duration-500">
            {/* BACKGROUND BLOBS - Preserved exactly as the original working version */}
            {blobAnimationEnabled && !distractionFree && (
              <>
                {isSafari ? (
                  <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                    <div className="absolute inset-0 w-full h-full blur-[80px] md:blur-[120px] opacity-60">
                      <div
                        className="absolute top-[-10%] left-[20%] w-[500px] h-[500px] rounded-full mix-blend-multiply animate-blob"
                        style={{
                          backgroundColor: "var(--accent)",
                          opacity: 0.35,
                        }}
                      />
                      <div
                        className="absolute top-[-10%] right-[10%] w-[600px] h-[600px] rounded-full mix-blend-multiply [animation:blob2_40s_infinite]"
                        style={{
                          backgroundColor: "var(--border)",
                          opacity: 0.45,
                        }}
                      />
                      <div
                        className="absolute bottom-[-20%] left-[10%] w-[600px] h-[600px] rounded-full mix-blend-multiply [animation:blob3_45s_infinite]"
                        style={{
                          backgroundColor: "var(--accent)",
                          opacity: 0.35,
                        }}
                      />
                      <div
                        className="absolute top-[30%] left-[40%] w-[400px] h-[400px] rounded-full mix-blend-multiply animate-blob"
                        style={{
                          backgroundColor: "var(--accent)",
                          opacity: 0.25,
                          animationDelay: "3s",
                        }}
                      />
                      <div
                        className="absolute bottom-[10%] right-[20%] w-[500px] h-[500px] rounded-full mix-blend-multiply [animation:blob2_40s_infinite]"
                        style={{
                          backgroundColor: "var(--border)",
                          opacity: 0.3,
                          animationDelay: "2s",
                        }}
                      />
                    </div>
                  </div>
                ) : (
                  <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                    <svg
                      className="absolute inset-0 w-full h-full"
                      viewBox="0 0 1200 800"
                      preserveAspectRatio="xMidYMid slice"
                      xmlns="http://www.w3.org/2000/svg"
                      aria-hidden="true"
                      focusable="false"
                      style={{ filter: "url(#kb-blob-blur-main)" }}
                    >
                      <defs>
                        <filter
                          id="kb-blob-blur-main"
                          x="-100%"
                          y="-100%"
                          width="300%"
                          height="300%"
                          filterUnits="objectBoundingBox"
                          primitiveUnits="userSpaceOnUse"
                        >
                          <feGaussianBlur
                            in="SourceGraphic"
                            stdDeviation="110"
                          />
                        </filter>
                      </defs>
                      <g style={{ mixBlendMode: "multiply" }}>
                        <g
                          className="animate-blob"
                          style={{
                            transformOrigin: "600px 400px",
                            animationDelay: "0s",
                            WebkitTransformStyle: "preserve-3d",
                          }}
                        >
                          <circle
                            cx="300"
                            cy="200"
                            r="220"
                            fill="var(--accent)"
                            opacity="0.18"
                            style={{ isolation: "isolate" }}
                          />
                        </g>
                        <g
                          className="[animation:blob2_40s_infinite]"
                          style={{
                            transformOrigin: "600px 400px",
                            animationDelay: "0s",
                            WebkitTransformStyle: "preserve-3d",
                          }}
                        >
                          <circle
                            cx="900"
                            cy="400"
                            r="260"
                            fill="var(--border)"
                            opacity="0.28"
                            style={{ isolation: "isolate" }}
                          />
                        </g>
                        <g
                          className="[animation:blob3_45s_infinite]"
                          style={{
                            transformOrigin: "600px 400px",
                            animationDelay: "0s",
                            WebkitTransformStyle: "preserve-3d",
                          }}
                        >
                          <circle
                            cx="250"
                            cy="650"
                            r="180"
                            fill="var(--accent)"
                            opacity="0.18"
                            style={{ isolation: "isolate" }}
                          />
                        </g>
                        <g
                          className="animate-blob"
                          style={{
                            transformOrigin: "600px 400px",
                            animationDelay: "3s",
                            WebkitTransformStyle: "preserve-3d",
                          }}
                        >
                          <circle
                            cx="600"
                            cy="300"
                            r="190"
                            fill="var(--accent)"
                            opacity="0.12"
                            style={{ isolation: "isolate" }}
                          />
                        </g>
                        <g
                          className="[animation:blob2_40s_infinite]"
                          style={{
                            transformOrigin: "600px 400px",
                            animationDelay: "2s",
                            WebkitTransformStyle: "preserve-3d",
                          }}
                        >
                          <circle
                            cx="750"
                            cy="550"
                            r="200"
                            fill="var(--border)"
                            opacity="0.15"
                            style={{ isolation: "isolate" }}
                          />
                        </g>
                        <g
                          className="[animation:blob3_45s_infinite]"
                          style={{
                            transformOrigin: "600px 400px",
                            animationDelay: "1s",
                            WebkitTransformStyle: "preserve-3d",
                          }}
                        >
                          <circle
                            cx="450"
                            cy="550"
                            r="210"
                            fill="var(--accent)"
                            opacity="0.12"
                            style={{ isolation: "isolate" }}
                          />
                        </g>
                      </g>
                    </svg>
                  </div>
                )}
              </>
            )}

            {/* SCROLL PROGRESS */}
            {!distractionFree && (
              <div className="fixed top-0 left-0 w-full h-1 z-[60] bg-transparent">
                <div
                  className="h-full bg-t-accent transition-all duration-100 ease-out"
                  style={{ width: `${scrollProgress * 100}%` }}
                ></div>
              </div>
            )}

            {/* NAVBAR */}
            {!distractionFree && (
              <nav className="sticky top-0 z-[20] w-full glass">

                                                  /[.*+?^${}()|[\]\\]/g,
                                                  "\\$&",

                                                "i",

        topic,
        activeId,
        onClick,
        onDrillDown,
        onDelete,
        isDragged,
        isDragOver,
        onDragStart,
        onDragOver,
        onDragLeave,
        onDrop,
      }) => (
        <div>
          <div
            className={`group flex items-center justify-between p-2 rounded-lg transition-all cursor-move ${isDragged ? "opacity-40" : ""} ${topic.id === activeId ? "bg-t-accent text-t-accent-fg shadow-md" : "text-t-text hover:bg-t-surface hover:text-t-accent"}`}
            onClick={onClick}
            onDoubleClick={onDrillDown}
            draggable
            onDragStart={() => onDragStart(topic.id)}
            onDragOver={(e) => {
              e.preventDefault();
              e.dataTransfer.dropEffect = "move";
              onDragOver(topic.id);
            }}
            onDragLeave={() => onDragLeave()}
            onDrop={(e) => {
              e.preventDefault();
              onDrop(topic.id);
            }}
          >
            <div className="flex items-center gap-3 overflow-hidden flex-1">
              <Icon name={topic.icon} size={16} />
              <span className="truncate text-sm font-medium select-none">
                {topic.title}
              </span>
              {topic.children.length > 0 && (
                <span
                  className={`text-[10px] px-1.5 rounded-full ${topic.id === activeId ? "bg-white/20" : "bg-t-border text-t-muted"}`}
                >
                  {topic.children.length}
                </span>
              )}
            </div>
            <div className="flex items-center md:opacity-0 md:group-hover:opacity-100 transition-opacity gap-1">
              <button
                onClick={(e) => {
                  e.stopPropagation();
                  onDrillDown();
                }}
                className={`p-1 rounded md:hidden ${topic.id === activeId ? "hover:bg-white/20" : "hover:bg-t-border"}`}
                title="Open Subtopics"
              >
                <Icon name="chevron-right" size={14} />
              </button>
              <button
                onClick={(e) => {
                  e.stopPropagation();
                  onDelete();
                }}
                className={`p-1 rounded hidden md:block ${topic.id === activeId ? "hover:bg-white/20" : "hover:bg-t-border hover:text-red-500"}`}
              >
                <Icon name="trash-2" size={14} />
              </button>
            </div>
          </div>
          {isDragOver && (
            <div className="h-0.5 bg-t-accent my-1 rounded-full"></div>
          )}
        </div>
      );

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
